version: "3.7"

# ─── Hannah Portfolio — Production Docker Compose ─────────────────────────────
# This compose file is intended to run strictly the Directus CMS and its DB
# on a Compute Engine VM. The frontend is hosted serverlessly on Cloud Run.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: hannah_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - directus

  directus:
    image: directus/directus:11
    container_name: hannah_directus_prod
    restart: always
    expose:
      - "8055"
    volumes:
      - directus_db_prod:/directus/database
      - directus_uploads_prod:/directus/uploads
      - ./directus/extensions:/directus/extensions:ro
    environment:
      # Secrets should be injected via an environment variable file (.env) on the VM
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"

      # SQLite Database
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"

      # CORS
      CORS_ENABLED: "true"
      # IMPORTANT: In production, tighten this to your actual Frontend URL
      CORS_ORIGIN: "http://34.100.194.88,http://localhost"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"

      LOG_LEVEL: "info"

      # Reverse proxy awareness — Directus uses this to build public asset URLs
      PUBLIC_URL: "http://34.100.194.88/cms"

  frontend:
    image: asia-south1-docker.pkg.dev/gen-lang-client-0321775722/portfolio/frontend:latest
    container_name: hannah_frontend_prod
    restart: always
    expose:
      - "4173"
    environment:
      - PORT=4173

  # ── RSS Sync ──────────────────────────────────────────────────────────────────
  rss-sync:
    image: asia-south1-docker.pkg.dev/gen-lang-client-0321775722/portfolio/rss-sync:latest
    container_name: hannah_rss_sync_prod
    restart: always
    env_file:
      - .env
    environment:
      DIRECTUS_URL: "http://directus:8055"
      SYNC_INTERVAL_MS: "21600000"
      SERVER_PORT: "3000"
    deploy:
      resources:
        limits:
          memory: 700m
    expose:
      - "3000"
    depends_on:
      - directus

volumes:
  directus_db_prod:
  directus_uploads_prod:
