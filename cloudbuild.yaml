steps:
  # Pull cached images from Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:latest || exit 0']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:latest || exit 0']
    id: 'pull-rss-sync-cache'

  # 1. Build the Frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_DIRECTUS_URL=http://34.100.194.88/cms'
      - '--cache-from'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:latest'
      - '.'
    id: 'build-frontend'

  # 2. Push the Frontend Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend'
    id: 'push-frontend'



  # 3. Build the rss-sync Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:latest'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:latest'
      - './rss-sync'
    id: 'build-rss-sync'
    waitFor: ['pull-rss-sync-cache']

  # 4. Push the rss-sync Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync'
    id: 'push-rss-sync'
    waitFor: ['build-rss-sync']

  # 5. Deploy App to Compute Engine (VM)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Fetch the static deploy key from Secret Manager (no ephemeral key injection)
        gcloud secrets versions access latest \
          --secret=hannah-deploy-ssh-key \
          --project=$PROJECT_ID > /root/.ssh/deploy_key
        chmod 600 /root/.ssh/deploy_key

        # Copy files to VM as the non-root deploy user
        scp -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          docker-compose.prod.yml deploy@34.100.194.88:/tmp/
        scp -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
          directus nginx rss-sync deploy@34.100.194.88:/tmp/

        # SSH in, move files, pull new images and restart containers
        ssh -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          deploy@34.100.194.88 "
            sudo cp /tmp/docker-compose.prod.yml /opt/hannah-portfolio/ && \
            sudo cp -r /tmp/directus /tmp/nginx /tmp/rss-sync /opt/hannah-portfolio/ && \
            cd /opt/hannah-portfolio && \
            docker rm -f hannah_rss_sync_prod 2>/dev/null || true && \
            gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet && \
            docker-compose -f docker-compose.prod.yml pull && \
            docker-compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
          "
    id: 'deploy-vm'
    waitFor: ['push-frontend', 'push-rss-sync']

  # 6. Bootstrap Directus schema — creates any missing collections, fields, relations,
  #    and public read permissions via the Directus REST API (curl from the VM).
  #    Fully idempotent: existing resources return 200/4xx which are silently ignored.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['ADMIN_EMAIL', 'ADMIN_PASSWORD']
    args:
      - '-c'
      - |
        gcloud secrets versions access latest \
          --secret=hannah-deploy-ssh-key \
          --project=$PROJECT_ID > /root/.ssh/deploy_key
        chmod 600 /root/.ssh/deploy_key

        scp -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          directus/bootstrap-schema.sh deploy@34.100.194.88:/tmp/bootstrap-schema.sh

        ssh -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          deploy@34.100.194.88 "
            chmod +x /tmp/bootstrap-schema.sh
            DIRECTUS_EMAIL='$$ADMIN_EMAIL' DIRECTUS_PASSWORD='$$ADMIN_PASSWORD' \
              bash /tmp/bootstrap-schema.sh http://localhost/cms
            rm /tmp/bootstrap-schema.sh
          "
    id: 'bootstrap-schema'
    waitFor: ['deploy-vm']

  # 7. Apply public read permissions (double-check after bootstrap).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['ADMIN_EMAIL', 'ADMIN_PASSWORD']
    args:
      - '-c'
      - |
        gcloud secrets versions access latest \
          --secret=hannah-deploy-ssh-key \
          --project=$PROJECT_ID > /root/.ssh/deploy_key
        chmod 600 /root/.ssh/deploy_key

        scp -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          directus/apply-permissions.mjs deploy@34.100.194.88:/tmp/apply-permissions.mjs

        ssh -i /root/.ssh/deploy_key -o StrictHostKeyChecking=no \
          deploy@34.100.194.88 "
            docker cp /tmp/apply-permissions.mjs hannah_directus_prod:/tmp/apply-permissions.mjs && \
            docker exec \
              -e DIRECTUS_URL=http://localhost:8055 \
              -e DIRECTUS_EMAIL='$$ADMIN_EMAIL' \
              -e DIRECTUS_PASSWORD='$$ADMIN_PASSWORD' \
              hannah_directus_prod \
              node /tmp/apply-permissions.mjs
          "
    id: 'apply-permissions'
    waitFor: ['bootstrap-schema']

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/frontend:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio/rss-sync:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hannah-admin-email/versions/latest
      env: 'ADMIN_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/hannah-admin-password/versions/latest
      env: 'ADMIN_PASSWORD'

options:
  logging: CLOUD_LOGGING_ONLY
