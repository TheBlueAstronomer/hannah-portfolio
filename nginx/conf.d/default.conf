# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream frontend_upstream {
    server frontend:4173;
}

upstream directus_upstream {
    server directus:8055;
}

upstream rss_upstream {
    server rss-sync:3000;
}

# ── HTTP Server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Frontend (SPA fallback) ───────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Vite HMR in dev)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Directus CMS (path-based, /cms prefix stripped) ──────────────────────
    location /cms/ {
        rewrite ^/cms/(.*)$ /$1 break;

        proxy_pass         http://directus_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Directus to generate correct public asset URLs
        proxy_set_header   X-Forwarded-Host  $host;

        # Large uploads (cover images via RSS sync)
        client_max_body_size 50M;
    }


    # ── Directus file assets (UUID paths only, e.g. /assets/3f2e1a4b-...) ─────
    location ~ "^/assets/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" {
        proxy_pass         http://directus_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header         Cache-Control "public, max-age=86400, immutable";
    }

    # ── RSS Sync health check ─────────────────────────────────────────────────
    location = /rss-status {
        proxy_pass         http://rss_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── RSS Sync on-demand trigger ────────────────────────────────────────────
    location = /rss-sync {
        proxy_pass         http://rss_upstream/sync;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
