version: "3.8"

# ─── Hannah Portfolio — Docker Compose ────────────────────────────────────────
#
#  Services:
#   nginx     — reverse proxy, http://localhost (port 80)
#   directus  — self-hosted CMS,  http://localhost/cms  (proxied via nginx)
#   frontend  — portfolio Vite app, http://localhost/  (proxied via nginx)
#   rss-sync  — polls Forbes RSS feed and imports new articles into Directus
#
#  First-time setup:
#   1. Copy .env.directus.example → .env.directus and fill in the secrets.
#   2. docker compose up directus
#   3. Open http://localhost/cms/admin and log in with ADMIN_EMAIL / ADMIN_PASSWORD.
#   4. Go to Settings → Data Model → create the "articles" collection
#      (or use: docker compose run --rm directus node /directus/seed/seed_articles.mjs)
#   5. Set the "articles" collection to public read:
#      Settings → Roles & Permissions → Public → articles → Read ✓
#   6. docker compose up frontend
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  # Single public entry point — routes / → frontend, /cms/ → directus, /assets/ → directus
  nginx:
    image: nginx:1.27-alpine
    container_name: hannah_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - directus
      - rss-sync

  # ── Directus CMS ─────────────────────────────────────────────────────────────
  directus:
    image: directus/directus:11
    container_name: hannah_directus
    restart: unless-stopped
    expose:
      - "8055"
    volumes:
      - directus_db:/directus/database       # SQLite database persistence
      - directus_uploads:/directus/uploads   # uploaded files / images
      - ./directus/seed:/directus/seed:ro    # seed scripts (read-only)
      - ./directus/extensions:/directus/extensions:ro  # custom extensions placeholder
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      SECRET: "${DIRECTUS_SECRET:-change-me-to-a-random-string-in-production}"

      # ── Database (SQLite — swap for Postgres if you need it later) ────────
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"

      # ── First-time admin account ──────────────────────────────────────────
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-changeme123}"

      # ── CORS — allow the Vite dev server and production frontend ──────────
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"          # reflects request origin; tighten in prod
      CORS_METHODS: "GET,POST,PATCH,DELETE"

      # ── Cache (optional but handy for a portfolio read-mostly workload) ───
      CACHE_ENABLED: "false"

      # ── Logging ───────────────────────────────────────────────────────────
      LOG_LEVEL: "info"

      # ── Reverse proxy awareness ───────────────────────────────────────────
      PUBLIC_URL: "http://localhost/cms"

  # ── Frontend (production preview) ────────────────────────────────────────────
  # Builds the Vite app and serves it with `vite preview` on port 4173.
  # For local dev, just run `npm run dev` on your host instead.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_DIRECTUS_URL: "http://localhost/cms"  # public URL routed through Nginx
    container_name: hannah_frontend
    restart: unless-stopped
    expose:
      - "4173"
    depends_on:
      - directus

  # ── RSS Sync ──────────────────────────────────────────────────────────────────
  # Polls the Forbes RSS proxy feed every 6 hours and imports new articles.
  # Requires DIRECTUS_TOKEN and FORBES_RSS_URL to be set in .env.directus.
  # To disable, comment out this service or remove it entirely.
  rss-sync:
    image: node:20-alpine
    container_name: hannah_rss_sync
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.directus
    volumes:
      - ./directus:/app/directus:ro          # rss-sync.mjs (read-only)
      - ./node_modules_rss:/app/node_modules # isolated node_modules
      - ./package_rss.json:/app/package.json:ro
    environment:
      DIRECTUS_URL: "http://directus:8055"   # internal Docker network URL
      SYNC_INTERVAL_MS: "21600000"           # 6 hours; lower for testing
      SERVER_PORT: "3000"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"      # rss.app cert chain not in Alpine's CA bundle
    command: ["sh", "-c", "npm install --silent && node directus/rss-sync.mjs --server"]
    expose:
      - "3000"                               # internal only — not published to host
    depends_on:
      - directus

volumes:
  directus_db:
  directus_uploads:
